<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Solar System</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
        }
    </style>
</head>

<body>

    <script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.179.1/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.179.1/examples/jsm/"
  }
}
</script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';


        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(
            35,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );

        camera.position.set(0, -4, 25);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);

        controls.target.set(0, 0, 0);

        controls.enableRotate = false;
        controls.enablePan = false;

        controls.enableZoom = true;

        controls.minDistance = 3;
        controls.maxDistance = 20;

        controls.zoomSpeed = 1.2;

        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        controls.maxDistance = 30;

        controls.update();


        // SOL
        const sunTexture = document.createElement('canvas');
        sunTexture.width = 512;
        sunTexture.height = 512;

        const ctx = sunTexture.getContext('2d');

        const gradient = ctx.createRadialGradient(256, 256, 0, 256, 256, 256);
        gradient.addColorStop(0, 'rgba(255,255,255,1)');
        gradient.addColorStop(0.4, 'rgba(255,255,255,0.18)');
        gradient.addColorStop(1, 'rgba(255,255,255,0)');

        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 512, 512);

        const texture = new THREE.CanvasTexture(sunTexture);

        const sun = new THREE.Mesh(
            new THREE.PlaneGeometry(4, 4),
            new THREE.MeshBasicMaterial({
                map: texture,
                transparent: true,
                depthWrite: false
            })
        );

        scene.add(sun);

        //SENDA ESTELAR
        function createTrail(distance, length = 0.8, segments = 48) {
                const geometry = new THREE.BufferGeometry();

                const positions = new Float32Array((segments + 1) * 3);
                const colors = new Float32Array((segments + 1) * 3);

                for (let i = 0; i <= segments; i++) {
                    const t = i / segments;
                    const angle = t * length;

                    positions[i * 3] = -Math.cos(angle) * distance;
                    positions[i * 3 + 1] = Math.sin(angle) * distance;
                    positions[i * 3 + 2] = 0;

                    colors[i * 3] = 1 - t;
                    colors[i * 3 + 1] = 1 - t;
                    colors[i * 3 + 2] = 1 - t;
                }

                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

                const material = new THREE.LineBasicMaterial({
                    vertexColors: true,
                    transparent: true,
                    opacity: 1,
                    depthWrite: false
                });

                return new THREE.Line(geometry, material);
            }

        // PLANETAS
        const planetData = [
            { name: 'planet1', distance: 2, size: 0.1, speed: 0.006 },
            { name: 'planet2', distance: 3, size: 0.15, speed: 0.004 },
            { name: 'planet3', distance: 4, size: 0.2, speed: 0.003 },
            { name: 'planet4', distance: 5.2, size: 0.3, speed: 0.002 },
            { name: 'planet5', distance: 6.5, size: 0.18, speed: 0.001 }
        ];

        const planets = [];

    planetData.forEach((data) => {
        const orbit = new THREE.Object3D();
        scene.add(orbit);

        const planet = new THREE.Mesh(
            new THREE.SphereGeometry(data.size, 32, 32),
            new THREE.MeshBasicMaterial({ color: 0xffffff })
        );

        planet.name = data.name;
        planet.position.x = -data.distance;

        const trail = createTrail(data.distance);

        orbit.add(trail);
        orbit.add(planet);

        planets.push({
            orbit,
            planet,
            trail,
            speed: data.speed
        });
    });

        // LOOP
        function animate() {
            requestAnimationFrame(animate);

            sun.lookAt(camera.position);

            planets.forEach((item) => {
                item.orbit.rotation.z += item.speed;
            });

            controls.update();

            renderer.render(scene, camera);
        }

        animate();
    </script>

</body>

</html>
